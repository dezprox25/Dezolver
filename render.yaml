# =============================================================
#  Dezolver — Render Deployment Configuration
#  Full monorepo deployment: Node.js backend + Vite/React frontend
# =============================================================

services:
  # ─────────────────────────────────────────────────────────
  # 🔹 BACKEND  (Node.js / TypeScript)
  # ─────────────────────────────────────────────────────────
  - type: web
    name: dezolver-backend
    runtime: node
    repo: https://github.com/dezprox25/Dezolver
    branch: main
    rootDir: backend

    # 1. Install dependencies  →  2. Compile TypeScript → dist/
    buildCommand: npm install && npm run build

    # Runs the compiled JS entry point (never ts-node in production)
    startCommand: node dist/server.js

    # ── Environment Variables ────────────────────────────────
    envVars:
      # --- Runtime ---
      - key: NODE_ENV
        value: production

      # Render injects PORT automatically; we pin 3000 as a safe default
      - key: PORT
        value: 3000

      # --- Security / Auth ---
      - key: JWT_SECRET
        generateValue: true # auto-generated by Render, stored securely

      - key: JWT_REFRESH_SECRET
        generateValue: true # required by validateEnvironment() — was missing

      - key: SESSION_SECRET
        generateValue: true # required by validateEnvironment() — was missing

      # --- Database (PostgreSQL) ---
      # Replace the placeholder value with your actual connection string
      # e.g. postgresql://user:password@host:5432/dbname?sslmode=require
      - key: DATABASE_URL
        value: my_database_url # ← replace with real value in Render dashboard

      # Individual DB fields parsed from DATABASE_URL by your app config
      # If your code reads DB_HOST / DB_PORT / DB_NAME etc. individually,
      # set them here too.  If it only reads DATABASE_URL you can remove these.
      - key: DB_SSL
        value: "true" # required for most managed Postgres providers

      # --- Redis ---
      # Replace the placeholder value with your actual Redis connection string
      # e.g. redis://:password@host:6379
      - key: REDIS_URL
        value: my_redis_url # ← replace with real value in Render dashboard

      # --- CORS — must match the deployed frontend origin exactly ---
      - key: FRONTEND_URL
        value: https://dezolver-frontend.onrender.com

      # --- Judge0 code-execution service ---
      # Key name matches process.env.JUDGE0_URL in backend/src/utils/environment.ts
      - key: JUDGE0_URL
        value: https://ce.judge0.com # was wrongly named JUDGE0_API_URL before

    plan: free
    # healthCheckPath: /health       # uncomment if you want Render to use /health

  # ─────────────────────────────────────────────────────────
  # 🔹 FRONTEND  (Vite + React — static site)
  # ─────────────────────────────────────────────────────────
  - type: web
    name: dezolver-frontend
    runtime: static
    repo: https://github.com/dezprox25/Dezolver
    branch: main
    rootDir: frontend

    # Compile TypeScript then bundle with Vite
    buildCommand: npm install && npm run build

    # Must match vite.config.ts → build.outDir  (currently "dist")
    staticPublishPath: dist

    # ── Environment Variables ────────────────────────────────
    envVars:
      # Full base URL for every Axios request in api.ts
      # /api suffix is required — config/index.ts uses this as the raw baseURL
      - key: VITE_API_URL
        value: https://dezolver-backend.onrender.com/api # was missing /api

      # Optional: set app environment so config/index.ts resolves isProduction correctly
      - key: VITE_ENV
        value: production

    plan: free

    # Serve index.html for all client-side routes (React Router)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
